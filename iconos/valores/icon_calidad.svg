<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Diamond / gem shape -->
  <polygon points="32,8 52,24 32,56 12,24" stroke="#c9a84c" stroke-width="1.5" fill="none"/>
  <!-- Inner horizontal cut line -->
  <line x1="14" y1="24" x2="50" y2="24"/>
  <!-- Left facet lines -->
  <line x1="14" y1="24" x2="32" y2="8"/>
  <line x1="23" y1="14" x2="14" y2="24"/>
  <!-- Right facet lines -->
  <line x1="50" y1="24" x2="32" y2="8"/>
  <line x1="41" y1="14" x2="50" y2="24"/>
  <!-- Center vertical from top to bottom -->
  <line x1="32" y1="8" x2="32" y2="56"/>
  <!-- Left lower facet -->
  <line x1="14" y1="24" x2="32" y2="56"/>
  <!-- Right lower facet -->
  <line x1="50" y1="24" x2="32" y2="56"/>
</svg>
